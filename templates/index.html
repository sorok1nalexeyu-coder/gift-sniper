<!DOCTYPE html><html lang="ru"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gift Sniper Dashboard</title>
<style>
:root{--bg:#0f1115;--card:#1a1d24;--acc:#6c5ce7;--txt:#e0e0e0;--ok:#00b894;--err:#d63031;--warn:#fdcb6e}
body{background:var(--bg);color:var(--txt);font-family:system-ui,sans-serif;margin:0;padding:20px}
.container{max-width:1000px;margin:0 auto}h1{text-align:center;margin-bottom:20px}
.tabs{display:flex;gap:10px;margin-bottom:20px}.tab{padding:10px 20px;background:var(--card);border:none;color:var(--txt);cursor:pointer;border-radius:6px;font-weight:bold}.tab.active{background:var(--acc);color:#fff}
.panel{background:var(--card);padding:20px;border-radius:8px;display:none}.panel.active{display:block}
label{display:block;margin:10px 0 4px;font-size:14px}
input,select{width:100%;background:#222;border:1px solid #444;color:#fff;padding:8px;border-radius:4px;margin-bottom:8px;font-family:monospace}
button.save{background:var(--ok);color:#fff;padding:10px 20px;border:none;border-radius:4px;cursor:pointer;font-weight:bold}
.event-item{padding:8px;border-bottom:1px solid #333;font-size:14px}.event-item .ts{color:#888;font-size:12px}
.level-info{color:var(--ok)}.level-warn{color:var(--warn)}.level-error{color:var(--err)}
pre{background:#000;padding:10px;overflow-x:auto;font-size:13px;max-height:600px;white-space:pre-wrap}
.status{position:fixed;top:10px;right:10px;padding:8px 15px;border-radius:4px;background:var(--acc);color:#fff;display:none}
</style></head><body>
<div class="container"><h1>🎁 Gift Sniper Control</h1>
<div class="tabs"><button class="tab active" onclick="switchTab('config')">⚙️ Конфиг</button><button class="tab" onclick="switchTab('events')">📋 События</button><button class="tab" onclick="switchTab('logs')">📜 Логи</button></div>
<div id="config" class="panel active"><form id="cfgForm">
<label>API ID</label><input type="number" id="api_id"><label>API Hash</label><input id="api_hash"><label>Телефон</label><input id="phone">
<label>Мин/Макс цена ⭐</label><div style="display:flex;gap:10px"><input type="number" id="min_price_stars" placeholder="Min"><input type="number" id="max_price_stars" placeholder="Max"></div>
<label>Только коллекционные</label><select id="only_collectibles"><option value="true">✅ Да</option><option value="false">❌ Нет</option></select>
<label>Допустимые редкости</label><input id="allowed_rarities" placeholder="collectible,nft,legendary,epic">
<label>Авто-ставки на аукционах</label><select id="auto_bid_auctions"><option value="true">✅ Вкл</option><option value="false">❌ Выкл</option></select>
<label>Макс. ставка / Шаг ⭐</label><div style="display:flex;gap:10px"><input type="number" id="auction_max_bid_stars"><input type="number" id="auction_bid_step"></div>
<label>Порог Ultra-Rare (тираж)</label><input type="number" id="ultra_rare_threshold">
<label>Токен бота / Chat ID</label><div style="display:flex;gap:10px"><input id="notification_bot_token" placeholder="Bot Token"><input id="notification_chat_id" placeholder="Chat ID"></div>
<label>Режим Dry-Run</label><select id="dry_run"><option value="true">🧪 Тест</option><option value="false">⚡ Боевой</option></select>
<button type="button" class="save" onclick="saveConfig()">💾 Сохранить конфиг</button>
</form></div>
<div id="events" class="panel"><button onclick="loadEvents()" style="margin-bottom:10px;background:#444;color:#fff;border:none;padding:6px 12px;border-radius:4px;cursor:pointer">🔄 Обновить</button><div id="eventsList"></div></div>
<div id="logs" class="panel"><pre id="logsContent">Загрузка...</pre></div></div>
<div id="status" class="status"></div>
<script>
function switchTab(id){document.querySelectorAll('.panel,.tab').forEach(e=>e.classList.remove('active'));document.getElementById(id).classList.add('active');event.target.classList.add('active');if(id==='events')loadEvents();if(id==='logs')loadLogs()}
async function loadConfig(){const r=await fetch('/api/config');if(r.ok){const d=await r.json();Object.keys(d).forEach(k=>{const el=document.getElementById(k);if(el)el.value=d[k];});document.getElementById('allowed_rarities').value=(d.allowed_rarities||[]).join(',');}}
async function saveConfig(){const d={};document.querySelectorAll('#cfgForm input,#cfgForm select').forEach(i=>d[i.id]=i.value);d.allowed_rarities=d.allowed_rarities.split(',').map(s=>s.trim()).filter(Boolean);['only_collectibles','auto_bid_auctions','dry_run'].forEach(k=>d[k]=d[k]==='true');d.min_price_stars=parseInt(d.min_price_stars)||0;d.max_price_stars=parseInt(d.max_price_stars)||5000;d.auction_max_bid_stars=parseInt(d.auction_max_bid_stars)||25000;d.auction_bid_step=parseInt(d.auction_bid_step)||100;d.ultra_rare_threshold=parseInt(d.ultra_rare_threshold)||100;const r=await fetch('/api/config',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)});showStatus(r.ok?'✅ Сохранено':'❌ Ошибка')}
async function loadEvents(){const r=await fetch('/api/events');const d=await r.json();document.getElementById('eventsList').innerHTML=d.reverse().map(e=>`<div class="event-item"><span class="ts">${e.ts}</span> <span class="level-${e.level}">[${e.level.toUpperCase()}]</span> ${e.title}: ${e.message}</div>`).join('')||'<div style="color:#888">Событий нет</div>'}
async function loadLogs(){document.getElementById('logsContent').textContent=await (await fetch('/api/logs')).text()}
function showStatus(m){const e=document.getElementById('status');e.textContent=m;e.style.display='block';setTimeout(()=>e.style.display='none',2000)}
loadConfig();
</script></body></html>
